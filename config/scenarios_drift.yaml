  params:
    distance_offset_m: 0.0
    offset_rate_mps: 0.0
    noise_std_m: 0.005
  duration: 1200.0
  runs: 0
  
# medium noise Scenario
medium_noise:
  params:
    distance_offset_m: 0.0
