# Scenarios Configuration for LiDAR Drift Data Collection
# =========================================================

# Baseline scenario: No drift injected
normal_operation_drift:
  params:
    distance_offset_m: 0.0
    offset_rate_mps: 0.0
    noise_std_m: 0.0
  duration: 1200.0
  runs: 0
   
# Low offset Scenario
low_offset:
  params:
    distance_offset_m: 0.005
    offset_rate_mps: 0.0
    noise_std_m: 0.0
  duration: 1200.0
  runs: 0


# Medium offset Scenario
high_offset:
  params:
    distance_offset_m: 0.025
    offset_rate_mps: 0.0
    noise_std_m: 0.0
  duration: 1200.0
  runs: 0
# High offset Scenario
high1_offset:
  params:
    distance_offset_m: 0.2
    offset_rate_mps: 0.0
    noise_std_m: 0.0
  duration: 1200.0
  runs: 12
  
# Low drift Scenario ~1.92 cm
low_drift:
  params:
    distance_offset_m: 0.0
    offset_rate_mps: 0.00008
    noise_std_m: 0.0
  duration: 1200.0
  runs: 0

# Medium drift Scenario ~ 1.7 cm
medium_drift:
  params:
    distance_offset_m: 0.0
    offset_rate_mps: 0.000142
    noise_std_m: 0.0
  duration: 1200.0
  runs: 0

# High drift Scenario ~8 cm -->0.000667 rate
high_drift:
  params:
    distance_offset_m: 0.0
    offset_rate_mps: 0.000555
    noise_std_m: 0.0
  duration: 1200.0
  runs: 0

  
