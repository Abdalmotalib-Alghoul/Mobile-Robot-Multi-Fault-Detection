# Scenarios Configuration for imu/pose Offset/drift Data Collection
# References: Palacín et al. (2022), e-SLAM (2022), Liu et al. (2022)

normal_operation:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.0
  duration: 1200  # 180s ROS time
  runs: 0

# === POSITION OFFSET SCENARIOS ===
# Reference: Palacín (76mm), e-SLAM (50cm)

pose_offset_light:
  params:
    pose_x_offset: 0.1      # Ref: Palacín 76mm
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.0
  duration: 900
  runs: 0

pose_offset_moderate:
  params:
    pose_x_offset: 0.2      # Between Palacín and e-SLAM
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.0
  duration: 900
  runs: 0

pose_offset_heavy:
  params:
    pose_x_offset: 1.0      # Ref: e-SLAM 50cm (using 60%)
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.0
  duration: 1200
  runs: 0

# === ANGULAR OFFSET SCENARIOS ===
# Reference: Palacín (5.86°), e-SLAM (5°)
# Note: pose_ang_z_offset is in DEGREES (converted to radians internally)

ang_pose_offset_light:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 2.5   # Light: 2°
    angular_velocity_z_rate: 0.0
  duration: 900
  runs: 0

ang_pose_offset_moderate:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 4.0   # Moderate: 3.5°
    angular_velocity_z_rate: 0.0
  duration: 900
  runs: 0

ang_pose_offset_heavy:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 2.5   # Ref: Palacín 5.86°, e-SLAM 5°
    angular_velocity_z_rate: 0.0
  duration: 1200
  runs: 0

# === ACCELEROMETER DRIFT SCENARIOS ===
# Reference: Liu et al. (2022) Table 3
# At 180s: drift = 0.5 × rate × 180² = 0.5 × rate × 32400

acc_drift_light:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.00005   # At 180s: 0.81m drift
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.0
  duration: 900
  runs: 0

acc_drift_moderate:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.00020   # At 180s: 3.24m drift (within Liu 1-4m range)
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.0
  duration: 900
  runs: 0

acc_drift_heavy:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.000087   # At 180s: 5.67m drift (Liu Table 3 MPU6050)
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.0
  duration: 1200
  runs: 10

# === GYROSCOPE DRIFT SCENARIOS ===
# Reference: Palacín (5.86°), e-SLAM (5°)
# At 180s: drift = rate × 180

ang_drift_light:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.000291   # At 180s: 3.0° drift
  duration: 900
  runs: 0

ang_drift_moderate:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.000388   # At 180s: 4.0° drift
  duration: 900
  runs: 0

ang_drift_heavy:
  params:
    pose_x_offset: 0.0
    acceleration_x_rate: 0.0
    pose_ang_z_offset: 0.0
    angular_velocity_z_rate: 0.000482     # new:0.001454 =15 degree.  Old: 0.000485 At 180s: 5.0° drift (e-SLAM reference)
  duration: 1200
  runs: 10

